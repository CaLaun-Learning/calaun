{% extends "base.html" %}
{% load static %}
{% load extra_tags %}

{% block title %}Result - Calc Tutor{% endblock %}

{% block content %}
<!-- Header -->
<header class="header">
    <h1 class="header__title"><a href="/">Calc Tutor</a></h1>
    <nav class="header__nav">
        <a href="#" class="header__link" data-chat-trigger>Chat Bot</a>
        <a href="/reference" class="header__link">Reference</a>
    </nav>
</header>

<!-- Search -->
<div class="search-container">
    <form action="/input/" class="search-form" method="GET">
        {{ form.i }}
        <input type="submit" value="Solve">
    </form>
</div>

<!-- Results -->
<div class="results">
    <div class="steps-controls">
        <button id="toggleAllSteps" class="btn btn--secondary">Show all steps</button>
    </div>
    {% for cell in result %}
        {% show_card cell input %}
    {% endfor %}
</div>

<!-- Chat Modal -->
<div id="chatModal" class="modal">
    <div class="modal__content">
        <div class="modal__header">
            <h2 class="modal__title">Calc Bot</h2>
            <button class="modal__close" aria-label="Close">&times;</button>
        </div>
        <div class="chat-log"></div>
        <div class="chat-input">
            <input type="text" placeholder="Ask a question..." aria-label="Chat message">
            <button>Send</button>
        </div>
    </div>
</div>

<script>
    window.CHATBOT_URL = '{% url "chatbot" %}';
</script>
{% endblock %}
